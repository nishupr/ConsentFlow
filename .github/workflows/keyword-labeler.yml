name: "Smart PR & Issue Labeler"

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited, synchronize]
  issue_comment:
    types: [created]

jobs:
  labeler:
    name: Smart Auto Labeler
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Keyword and Extension Labeler
        uses: actions/github-script@v7
        with:
          script: |
            const isComment = !!context.payload.comment;
            const isPR = !!context.payload.issue?.pull_request || !!context.payload.pull_request;
            const item = context.payload.pull_request || context.payload.issue;
            
            // -----------------------------------------------------------------
            // Maintainer-Only Commands (e.g., gssoc:approved)
            // -----------------------------------------------------------------
            if (isComment) {
              const commentBody = context.payload.comment.body.toLowerCase();
              const authorRole = context.payload.comment.author_association;
              const isMaintainer = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(authorRole);
              
              if (isMaintainer && (commentBody.includes('/approve') || commentBody.includes('/gssoc approved'))) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: item.number,
                  labels: ['gssoc:approved']
                });
              }
              // If it's just a comment, don't run the rest of the auto-labeler
              return;
            }

            // -----------------------------------------------------------------
            // Automated Keyword Labeling (For all users)
            // -----------------------------------------------------------------
            const title = item.title.toLowerCase();
            const body = (item.body || '').toLowerCase();
            const fullText = `${title} ${body}`;
            
            const labelsToAdd = new Set();
            
            // 1. Difficulty Level Patterns
            if (fullText.match(/\b(urgent|critical|breaking)\b/)) labelsToAdd.add('level:critical');
            else if (fullText.match(/\b(complex|architecture|rewrite)\b/)) labelsToAdd.add('level:advanced');
            else if (fullText.match(/\b(typo|simple|easy)\b/)) labelsToAdd.add('level:beginner');
            else if (fullText.match(/\b(moderate|refactor)\b/)) labelsToAdd.add('level:intermediate');
            
            // 2. Type Patterns (Title prefix or keywords)
            if (title.startsWith('feat:') || title.startsWith('feature:')) labelsToAdd.add('type:feature');
            if (title.startsWith('bug:') || title.startsWith('fix:')) labelsToAdd.add('type:bug');
            if (title.startsWith('docs:')) labelsToAdd.add('type:docs');
            if (fullText.match(/\b(test|jest|pytest|vitest|coverage)\b/)) labelsToAdd.add('type:testing');
            if (fullText.match(/\b(xss|cve|vulnerability|security)\b/)) labelsToAdd.add('type:security');
            if (fullText.match(/\b(slow|memory|performance|latency|optimize)\b/)) labelsToAdd.add('type:performance');
            if (fullText.match(/\b(ui|ux|css|design|style)\b/)) labelsToAdd.add('type:design');
            if (title.startsWith('refactor:')) labelsToAdd.add('type:refactor');
            if (fullText.match(/\b(ci|cd|action|docker|deploy|workflow)\b/)) labelsToAdd.add('type:devops');
            if (fullText.match(/\b(a11y|accessibility|aria|screen reader)\b/)) labelsToAdd.add('type:accessibility');
            
            // 3. Quality & Special Patterns
            if (fullText.match(/\b(clean code|refactored beautifully)\b/)) labelsToAdd.add('quality:clean');
            if (fullText.match(/\b(exceptional|outstanding)\b/)) labelsToAdd.add('quality:exceptional');
            
            // NOTE: 'gssoc:approved' is explicitly EXCLUDED here so users cannot self-assign it.
            
            if (fullText.match(/\b(good first issue|beginner friendly)\b/)) labelsToAdd.add('good first issue');
            if (fullText.match(/\b(help wanted|need help)\b/)) labelsToAdd.add('help wanted');
            if (fullText.match(/\b(duplicate of)\b/)) labelsToAdd.add('duplicate');

            // 4. File Extension Checks (for PRs only)
            if (!!context.payload.pull_request) {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: item.number,
              });
              
              const extensions = files.map(f => f.filename.split('.').pop());
              
              if (extensions.includes('css') || extensions.includes('tsx') || extensions.includes('jsx')) labelsToAdd.add('type:design');
              if (extensions.includes('php') || extensions.includes('sh')) labelsToAdd.add('type:security');
              if (extensions.includes('py')) labelsToAdd.add('backend');
              if (extensions.includes('yml') || extensions.includes('yaml')) labelsToAdd.add('type:devops');
            }
            
            // Apply Labels
            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: item.number,
                labels: Array.from(labelsToAdd)
              });
            }
            
            // 5. Missing Difficulty Warning (GSSoC Check) for PRs
            if (!!context.payload.pull_request) {
              const currentLabels = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: item.number
              });
              const hasLevelLabel = currentLabels.data.some(l => l.name.startsWith('level:')) || 
                                    Array.from(labelsToAdd).some(l => l.startsWith('level:'));
              
              if (!hasLevelLabel) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: item.number,
                  body: "⚠️ **Warning for GSSoC Contributors:** This PR does not have a `level:*` difficulty label. A difficulty label is required for your PR to receive points on the GSSoC leaderboard! Please update the PR body or title with clear context so maintainers can assign one."
                });
              }
            }
