services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: consentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-consentflow}
      POSTGRES_USER: ${POSTGRES_USER:-consentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-consentflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-consentflow} -d ${POSTGRES_DB:-consentflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - consentflow-net

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: consentflow-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - consentflow-net

  # ── Zookeeper ─────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: consentflow-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      # cub (Confluent Utility Belt) ships in every cp-zookeeper image.
      # It blocks until ZK is accepting connections on 2181, then exits 0.
      test: ["CMD", "bash", "-c", "cub zk-ready localhost:2181 5"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - consentflow-net

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: consentflow-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners:
      #   PLAINTEXT      → internal (container-to-container) on 9092
      #   PLAINTEXT_HOST → external (host machine) on 29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      # cub kafka-ready waits until at least 1 broker is reachable.
      test: ["CMD", "bash", "-c", "cub kafka-ready -b localhost:9092 1 10"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 30s
    networks:
      - consentflow-net

  # ── ConsentFlow API ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consentflow-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-consentflow}
      POSTGRES_USER: ${POSTGRES_USER:-consentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-consentflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # ── Kafka (internal broker address for container-to-container traffic) ──
      KAFKA_BROKER_URL: kafka:9092
      KAFKA_TOPIC_REVOKE: ${KAFKA_TOPIC_REVOKE:-consent.revoked}
      # ── Gemini AI (RAG chat, Plan 1.4) ──────────────────────────────────────
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # ── Mistral AI (Fallback) ──────────────────────────────────────────────────
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      # ── Gate 05 + Gemini fallback ──────────────────────────────────────────────
      # Ollama runs as a Windows app on the host — host.docker.internal resolves
      # to the Docker host IP from inside any container.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma2:2b
      # ── Step 7: OpenTelemetry ────────────────────────────────────────────────
      OTEL_ENABLED: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - consentflow-net

  # ── OTel Collector ────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: consentflow-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape endpoint
      - "13133:13133" # Health check
    networks:
      - consentflow-net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: consentflow-grafana
    restart: unless-stopped
    depends_on:
      - otel-collector
    environment:
      # Anonymous access in dev — no login required
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_HTTP_PORT: "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - consentflow-net

volumes:
  postgres_data:
  grafana_data:

networks:
  consentflow-net:
    driver: bridge
