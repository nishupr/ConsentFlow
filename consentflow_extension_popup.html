
<style>
  :root {
    --cf-bg: #0f172a;
    --cf-surface: #1e293b;
    --cf-surface2: #263147;
    --cf-border: rgba(255,255,255,0.08);
    --cf-accent: #6366f1;
    --cf-accent-dim: rgba(99,102,241,0.15);
    --cf-text: #f1f5f9;
    --cf-muted: #94a3b8;
    --cf-green: #22c55e;
    --cf-red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: var(--font-sans, system-ui, sans-serif); }
  .popup {
    width: 360px;
    background: var(--cf-bg);
    border-radius: 16px;
    border: 0.5px solid var(--cf-border);
    overflow: hidden;
    color: var(--cf-text);
    font-size: 14px;
    margin: 0 auto;
  }
  .header {
    padding: 16px 18px 14px;
    border-bottom: 0.5px solid var(--cf-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .shield-icon {
    width: 32px; height: 32px;
    background: var(--cf-accent-dim);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .shield-icon svg { width: 18px; height: 18px; }
  .header-title { font-size: 15px; font-weight: 500; color: var(--cf-text); }
  .header-sub { font-size: 12px; color: var(--cf-muted); margin-top: 1px; }
  .status-dot {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--cf-muted);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cf-green); }
  .dot.offline { background: var(--cf-red); }
  .section { padding: 14px 18px; border-bottom: 0.5px solid var(--cf-border); }
  .section-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    color: var(--cf-muted); text-transform: uppercase; margin-bottom: 10px;
  }
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0;
  }
  .toggle-row:not(:last-child) { border-bottom: 0.5px solid var(--cf-border); }
  .toggle-label { display: flex; align-items: center; gap: 8px; }
  .type-badge {
    font-size: 10px; font-weight: 500;
    padding: 2px 6px; border-radius: 4px;
    background: var(--cf-surface2);
    color: var(--cf-muted);
    letter-spacing: 0.03em;
  }
  .toggle-name { font-size: 13px; color: var(--cf-text); }
  .toggle-switch {
    width: 36px; height: 20px;
    border-radius: 10px;
    background: var(--cf-accent);
    position: relative; cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
    border: none; outline: none;
  }
  .toggle-switch.off { background: var(--cf-surface2); }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  .toggle-switch.off::after { transform: translateX(0); }
  .toggle-switch:not(.off)::after { transform: translateX(16px); }
  .session-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .session-card {
    background: var(--cf-surface);
    border-radius: 8px;
    padding: 10px 12px;
    border: 0.5px solid var(--cf-border);
  }
  .session-card-type { font-size: 10px; color: var(--cf-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .session-card-count { font-size: 20px; font-weight: 500; color: var(--cf-text); }
  .session-card-label { font-size: 11px; color: var(--cf-muted); margin-top: 1px; }
  .empty-state {
    font-size: 13px; color: var(--cf-muted);
    text-align: center; padding: 12px 0 4px;
  }
  .clear-btn {
    width: 100%; padding: 8px;
    background: transparent;
    border: 0.5px solid var(--cf-border);
    border-radius: 8px;
    color: var(--cf-muted);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    margin-top: 10px;
  }
  .clear-btn:hover { background: var(--cf-surface); color: var(--cf-text); }
  .footer { padding: 12px 18px; }
  .footer-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .footer-row:last-child { margin-bottom: 0; }
  .disable-btn {
    font-size: 13px; color: var(--cf-muted);
    background: transparent; border: 0.5px solid var(--cf-border);
    border-radius: 8px; padding: 7px 12px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .disable-btn:hover { background: var(--cf-surface); color: var(--cf-text); }
  .backend-row {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--cf-muted);
  }
  .backend-url { font-size: 12px; color: var(--cf-muted); font-family: var(--font-mono, monospace); }
  .edit-btn {
    font-size: 11px; color: var(--cf-accent);
    background: transparent; border: none; cursor: pointer; padding: 0;
  }
  .protected-banner {
    display: flex; align-items: center; gap: 8px;
    background: var(--cf-accent-dim);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 12px;
  }
  .protected-count { font-size: 22px; font-weight: 500; color: var(--cf-accent); }
  .protected-label { font-size: 12px; color: var(--cf-muted); }
</style>

<div class="popup">
  <div class="header">
    <div class="header-left">
      <div class="shield-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="#6366f1"/>
          <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="header-title">ConsentFlow Shield</div>
        <div class="header-sub">Active on this page</div>
      </div>
    </div>
    <div class="status-dot" id="status-indicator">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Backend online</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">PII Masking</div>
    <div id="toggles">
      <div class="toggle-row">
        <div class="toggle-label">
          <span class="toggle-name">Full name</span>
          <span class="type-badge">PERSON</span>
        </div>
        <button class="toggle-switch" data-type="PERSON" onclick="toggleSwitch(this)"></button>
      </div>
      <div class="toggle-row">
        <div class="toggle-label">
          <span class="toggle-name">Phone number</span>
          <span class="type-badge">PHONE</span>
        </div>
        <button class="toggle-switch" data-type="PHONE_NUMBER" onclick="toggleSwitch(this)"></button>
      </div>
      <div class="toggle-row">
        <div class="toggle-label">
          <span class="toggle-name">Aadhaar</span>
          <span class="type-badge">IN_AADHAAR</span>
        </div>
        <button class="toggle-switch" data-type="IN_AADHAAR" onclick="toggleSwitch(this)"></button>
      </div>
      <div class="toggle-row">
        <div class="toggle-label">
          <span class="toggle-name">Email address</span>
          <span class="type-badge">EMAIL</span>
        </div>
        <button class="toggle-switch" data-type="EMAIL_ADDRESS" onclick="toggleSwitch(this)"></button>
      </div>
      <div class="toggle-row">
        <div class="toggle-label">
          <span class="toggle-name">PAN card</span>
          <span class="type-badge">IN_PAN</span>
        </div>
        <button class="toggle-switch" data-type="IN_PAN" onclick="toggleSwitch(this)"></button>
      </div>
      <div class="toggle-row" style="border-bottom: none;">
        <div class="toggle-label">
          <span class="toggle-name">UPI ID</span>
          <span class="type-badge">UPI_ID</span>
        </div>
        <button class="toggle-switch" data-type="UPI_ID" onclick="toggleSwitch(this)"></button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">This session</div>
    <div class="protected-banner">
      <div class="protected-count" id="total-count">5</div>
      <div>
        <div style="font-size: 13px; font-weight: 500; color: var(--cf-accent);">items protected</div>
        <div class="protected-label">across 2 messages</div>
      </div>
    </div>
    <div class="session-grid" id="session-grid">
      <div class="session-card">
        <div class="session-card-type">Person</div>
        <div class="session-card-count">2</div>
        <div class="session-card-label">masked</div>
      </div>
      <div class="session-card">
        <div class="session-card-type">Phone</div>
        <div class="session-card-count">1</div>
        <div class="session-card-label">masked</div>
      </div>
      <div class="session-card">
        <div class="session-card-type">Aadhaar</div>
        <div class="session-card-count">1</div>
        <div class="session-card-label">masked</div>
      </div>
      <div class="session-card">
        <div class="session-card-type">Email</div>
        <div class="session-card-count">1</div>
        <div class="session-card-label">masked</div>
      </div>
    </div>
    <button class="clear-btn" onclick="clearVault()">Clear session vault</button>
  </div>

  <div class="footer">
    <div class="footer-row">
      <button class="disable-btn" id="disable-btn" onclick="toggleSite()">Disable on this site</button>
      <div class="backend-row">
        <span class="backend-url" id="backend-url">localhost:8000</span>
        <button class="edit-btn" onclick="editBackend()">Edit</button>
      </div>
    </div>
    <div id="backend-edit" style="display:none; margin-top: 6px;">
      <input id="backend-input" type="text" value="http://localhost:8000"
        style="width: 100%; padding: 7px 10px; background: var(--cf-surface); border: 0.5px solid var(--cf-border); border-radius: 8px; color: var(--cf-text); font-size: 13px; font-family: var(--font-mono, monospace);"
        onkeydown="if(event.key==='Enter') saveBackend()" />
      <div style="display: flex; gap: 6px; margin-top: 6px;">
        <button onclick="saveBackend()" style="flex:1; padding: 7px; background: var(--cf-accent); border: none; border-radius: 8px; color: #fff; font-size: 13px; cursor: pointer;">Save</button>
        <button onclick="cancelBackend()" style="flex:1; padding: 7px; background: var(--cf-surface); border: 0.5px solid var(--cf-border); border-radius: 8px; color: var(--cf-muted); font-size: 13px; cursor: pointer;">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
  let siteDisabled = false;
  let backendOnline = true;

  function toggleSwitch(btn) {
    btn.classList.toggle('off');
  }

  function clearVault() {
    const grid = document.getElementById('session-grid');
    const total = document.getElementById('total-count');
    grid.innerHTML = '<div style="grid-column:1/-1"><p class="empty-state">Nothing masked yet this session</p></div>';
    total.textContent = '0';
    const banner = document.querySelector('.protected-label');
    if (banner) banner.textContent = 'across 0 messages';
  }

  function toggleSite() {
    siteDisabled = !siteDisabled;
    const btn = document.getElementById('disable-btn');
    btn.textContent = siteDisabled ? 'Re-enable on this site' : 'Disable on this site';
    btn.style.color = siteDisabled ? 'var(--cf-red)' : '';
    btn.style.borderColor = siteDisabled ? 'rgba(239,68,68,0.3)' : '';
  }

  function editBackend() {
    document.getElementById('backend-edit').style.display = 'block';
    document.getElementById('backend-input').focus();
  }

  function saveBackend() {
    const val = document.getElementById('backend-input').value.trim();
    const display = val.replace(/^https?:\/\//, '');
    document.getElementById('backend-url').textContent = display;
    document.getElementById('backend-edit').style.display = 'none';
    pingBackend();
  }

  function cancelBackend() {
    document.getElementById('backend-edit').style.display = 'none';
  }

  function pingBackend() {
    backendOnline = !backendOnline;
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    if (backendOnline) {
      dot.classList.remove('offline');
      text.textContent = 'Backend online';
    } else {
      dot.classList.add('offline');
      text.textContent = 'Backend offline';
    }
  }
</script>
